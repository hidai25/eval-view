# =============================================================================
# QUICK START - Copy this to your repository!
# =============================================================================
# Catches agent regressions on every PR. Posts a comment with pass/fail + diff.
#
# Setup:
#   1. Copy to .github/workflows/evalview.yml in your repo
#   2. Add OPENAI_API_KEY to repository secrets
#   3. Run `evalview snapshot` locally to create your baseline
#   4. Commit .evalview/golden/ to git
# =============================================================================

name: EvalView Regression Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for regressions
        id: evalview
        uses: hidai25/eval-view@v0.4.0
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          fail-on: REGRESSION

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evalview-report
          path: evalview-report.html
          if-no-files-found: ignore

      - name: Post PR comment
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install evalview -q
          evalview ci comment --results ${{ steps.evalview.outputs.results-file }}
